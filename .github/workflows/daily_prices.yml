name: Daily price update

on:
  schedule:
    # 07:00 UTC = 09:00 Rīga (ziemā UTC+2). Vasarā būs 10:00.
    - cron: '0 7 * * *'
  workflow_dispatch:  # Ļauj palaist manuāli no GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repozitorijs
        uses: actions/checkout@v4

      - name: Uzstāda Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalē atkarības
        run: pip install -r requirements.txt

      - name: Vāc cenas
        run: python collect_prices.py

      - name: Commitē vēstures datus
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/price_history.csv
          git diff --staged --quiet || git commit -m "chore: daily price update $(date -u +%Y-%m-%d)"
          git push
