name: Daily price update

on:
  schedule:
    # 06:00 UTC = 09:00 Rīga (vasarā UTC+3). Ziemā būs 08:00.
    - cron: '0 6 * * *'
  workflow_dispatch:  # Ļauj palaist manuāli no GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repozitorijs
        uses: actions/checkout@v4

      - name: Uzstāda Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalē atkarības
        run: pip install -r requirements.txt

      - name: Vāc cenas
        timeout-minutes: 10
        run: |
          for attempt in 1 2 3; do
            echo "Mēģinājums $attempt/3..."
            python collect_prices.py && break
            if [ $attempt -lt 3 ]; then
              echo "Neizdevās, gaida 60s pirms atkārtojuma..."
              sleep 60
            else
              echo "Visi 3 mēģinājumi cieta neveiksmi."
              exit 1
            fi
          done

      - name: Commitē vēstures datus
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/price_history.csv
          git diff --staged --quiet || git commit -m "chore: daily price update $(date -u +%Y-%m-%d)"
          git push
